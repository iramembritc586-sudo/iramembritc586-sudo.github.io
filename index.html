<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ira · 项目作品集</title>
<meta name="description" content="Ira 的个人项目作品集：流媒体平台、旅行社 SaaS、无代码工具、视频解析等。">
<style>
  :root{
    --bg:#0b0d12; --bg2:#11141b; --card:#161a23; --line:#232838;
    --fg:#e8eaed; --muted:#9aa3b2; --accent:#5b8cff; --accent2:#7c5bff;
    --ok:#34d399; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--fg);
    font-family:-apple-system,"Segoe UI",system-ui,"Microsoft YaHei",sans-serif;
    line-height:1.65;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:980px;margin:0 auto;padding:0 22px}

  /* 顶部导航 */
  header.nav{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);
    background:rgba(11,13,18,.7);border-bottom:1px solid var(--line)}
  .nav .wrap{display:flex;align-items:center;gap:18px;height:58px}
  .brand{font-weight:700;letter-spacing:.5px}
  .brand b{background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .nav nav{margin-left:auto;display:flex;gap:20px}
  .nav nav a{color:var(--muted);font-size:14px;transition:.2s}
  .nav nav a:hover{color:var(--fg)}

  /* Hero */
  .hero{padding:84px 0 60px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:-40% 0 auto;height:480px;
    background:radial-gradient(600px 300px at 50% 0,rgba(91,140,255,.18),transparent 70%);
    pointer-events:none}
  .hero h1{font-size:clamp(30px,5vw,46px);line-height:1.2;font-weight:800;
    letter-spacing:-.5px}
  .hero h1 span{background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero p{color:var(--muted);max-width:560px;margin:16px auto 0;font-size:17px}
  .hero .links{margin-top:26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;
    font-size:14px;font-weight:600;border:1px solid var(--line);background:var(--card);
    color:var(--fg);cursor:pointer;transition:.2s}
  .btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));
    border:none;color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.disabled{opacity:.45;pointer-events:none}

  /* 区段标题 */
  .sec-title{display:flex;align-items:baseline;gap:12px;margin:54px 0 22px}
  .sec-title h2{font-size:22px;font-weight:700}
  .sec-title span{color:var(--muted);font-size:14px}

  /* 项目卡片 */
  .project{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:26px;margin-bottom:22px;transition:.25s}
  .project:hover{border-color:#2f3650}
  .p-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .p-logo{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
    font-size:22px;font-weight:800;color:#fff;flex:none}
  .p-title{font-size:20px;font-weight:700}
  .p-tag{color:var(--muted);font-size:13px}
  .badges{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
  .badge{font-size:12px;padding:3px 10px;border-radius:99px;background:#1d2230;
    color:#aeb6c6;border:1px solid var(--line)}
  .p-body{margin-top:18px;display:grid;gap:18px}
  .p-intro{color:#cfd4de}
  .p-block h4{font-size:13px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;margin-bottom:8px}
  .p-block ul{padding-left:18px;color:#cfd4de}
  .p-block li{margin:3px 0}
  pre{background:#0c0e14;border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;overflow:auto;font:13px/1.6 ui-monospace,Menlo,Consolas,monospace;
    color:#c6cde0}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

  footer{border-top:1px solid var(--line);margin-top:60px;padding:30px 0;
    color:var(--muted);font-size:13px;text-align:center}
  @media(max-width:600px){.badges{margin-left:0;width:100%}}
</style>
</head>
<body>

<header class="nav">
  <div class="wrap">
    <div class="brand"><b>IRA</b> · Projects</div>
    <nav>
      <a href="#iraone">iraone</a>
      <a href="#oncode">oncode</a>
      <a href="#toursaas">toursaas</a>
      <a href="#video-parser">video-parser</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <h1>你好，我是 <span>Ira</span><br>这是我的项目作品集</h1>
    <p>从流媒体平台、SaaS 系统到无代码工具与视频解析——下面每个项目都附有介绍、使用方法、源码与可直接使用的网页版。</p>
    <div class="links">
      <a class="btn primary" href="#projects">浏览项目 ↓</a>
      <a class="btn" href="https://github.com/iramembritc586-sudo" target="_blank">GitHub 主页</a>
    </div>
  </div>
</section>

<main class="wrap" id="projects">
  <div class="sec-title"><h2>项目</h2><span>4 个 · 持续更新</span></div>
  <div id="list"></div>
</main>

<footer>
  <div class="wrap">© <span id="year"></span> Ira · 用 ❤️ 构建 · <a href="https://github.com/iramembritc586-sudo" target="_blank" style="color:var(--accent)">github.com/iramembritc586-sudo</a></div>
</footer>

<script src="projects.js"></script>
<script src="render.js"></script>
</body>
</html>
